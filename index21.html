    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyv-tioEQw7EJw4vDD7Z9cVKDjULDcNydq5xf6clBnujq0OfzdkFJhz-M4VBFtQFSw6tw/exec";
        function trackClick(postId, target) {
            new Image().src = GAS_URL + "?action=click&id=" + postId + "&target=" + target + "&t=" + new Date().getTime();
        }
        async function loadPinned() {
            try {
                const res = await fetch(GAS_URL + "?action=get_pinned");
                const pinnedIds = await res.json();
                const container = document.getElementById('pinned-posts');
                if (!pinnedIds || pinnedIds.length === 0) return;
                
                for (let obj of pinnedIds) {
                    const link = document.createElement('a');
                    link.href = obj.slug + '.html';
                    link.className = 'card';
                    link.innerHTML = '<div class="list-placeholder">...</div>';
                    container.appendChild(link);
                }
            } catch(e) { console.error(e); }
        }
        document.addEventListener("DOMContentLoaded", loadPinned);
    </script>
